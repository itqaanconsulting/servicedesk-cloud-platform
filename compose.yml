services:
  ticket-database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: servicedesk
      POSTGRES_PASSWORD: servicedesk
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicedesk -d tickets"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ticket-data:/var/lib/postgresql/data

  ticket-service:
    build:
      context: services/ticket-service
    ports:
      - "8181:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://ticket-database:5432/tickets
      DB_USERNAME: servicedesk
      DB_PASSWORD: servicedesk
    depends_on:
      ticket-database:
        condition: service_healthy

  technician-service:
    build:
      context: services/technician-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082

  notification-service:
    build:
      context: services/notification-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083

volumes:
  ticket-data:
