spring:
  application:
    name: ticket-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tickets}
    username: ${DB_USERNAME:servicedesk}
    password: ${DB_PASSWORD:servicedesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: Ticket Service
    description: Manages the service desk ticket lifecycle
